name: LinkedIn Post

on:
  schedule:
    - cron: '30 5 * * 1'  # Monday 05:30 UTC = Monday 11:00 IST
    - cron: '30 5 * * 3'  # Wednesday 05:30 UTC = Wednesday 11:00 IST
    - cron: '30 5 * * 6'  # Saturday 05:30 UTC = Saturday 11:00 IST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4

      - name: Find today's release
        id: find
        run: |
          TODAY=$(date -u +'%Y-%m-%d')
          YESTERDAY=$(date -u -d 'yesterday' +'%Y-%m-%d')

          EP=$(jq -r --arg t "$TODAY" --arg y "$YESTERDAY" \
            '.episodes[] | select(.status == "published" and (.published_on == $t or .published_on == $y)) | .ep' \
            manifest.json | tail -1)

          if [ -z "$EP" ] || [ "$EP" = "null" ]; then
            echo "No episode published today. Skipping LinkedIn post."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLUG=$(jq -r --argjson n "$EP" '.episodes[] | select(.ep == $n) | .slug' manifest.json)
          POST_TEXT=$(jq -r --argjson n "$EP" '.episodes[] | select(.ep == $n) | .linkedin_post // empty' manifest.json)

          if [ -z "$POST_TEXT" ]; then
            echo "No linkedin_post text found for EP$EP. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found EP$EP ($SLUG)"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "ep=$EP" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          jq -r --argjson n "$EP" '.episodes[] | select(.ep == $n) | .linkedin_post' manifest.json > /tmp/post_text.txt

      - name: Verify site is deployed
        if: steps.find.outputs.skip != 'true'
        run: |
          SLUG="${{ steps.find.outputs.slug }}"
          URL="https://mimran-khan.github.io/series/demystifying-ai/${SLUG}"
          echo "Checking: $URL"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Site is live (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - waiting 60s..."
            sleep 60
          done

          echo "::error::Site not deployed after 5 attempts."
          exit 1

      - name: Warm LinkedIn URL preview cache
        if: steps.find.outputs.skip != 'true'
        run: |
          SLUG="${{ steps.find.outputs.slug }}"
          EP_NUM=$(printf '%02d' ${{ steps.find.outputs.ep }})
          ARTICLE_URL="https://mimran-khan.github.io/series/demystifying-ai/${SLUG}"
          OG_IMAGE_URL="https://mimran-khan.github.io/og-series-ep${EP_NUM}-${SLUG}.png"

          echo "Pre-warming LinkedIn crawler cache..."
          echo "Article: $ARTICLE_URL"
          echo "OG Image: $OG_IMAGE_URL"

          curl -s -o /dev/null "https://www.linkedin.com/sharing/share-offsite/?url=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("'"$ARTICLE_URL"'"))')"

          OG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$OG_IMAGE_URL")
          echo "OG image status: HTTP $OG_STATUS"

          echo "Waiting 45s for LinkedIn to cache the preview..."
          sleep 45

      - name: Post to LinkedIn
        if: steps.find.outputs.skip != 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          SLUG="${{ steps.find.outputs.slug }}"
          EP_NUM=$(printf '%02d' ${{ steps.find.outputs.ep }})
          ARTICLE_URL="https://mimran-khan.github.io/series/demystifying-ai/${SLUG}"

          TITLE=$(jq -r --argjson n ${{ steps.find.outputs.ep }} \
            '.episodes[] | select(.ep == $n) | .title' manifest.json)

          DESCRIPTION=$(awk 'BEGIN{f=0} /^$/{if(f==0){f=1;next}} f==1&&/[a-zA-Z]/{print;f=2} f==2&&/^$/{exit} f==2{print}' /tmp/post_text.txt)
          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION="Demystifying AI in 5 Minutes. Built for engineers who ship."
          fi

          OG_IMAGE_URL="https://mimran-khan.github.io/og-series-ep${EP_NUM}-${SLUG}.png"

          jq -n \
            --arg author "$LINKEDIN_PERSON_URN" \
            --rawfile text /tmp/post_text.txt \
            --arg url "$ARTICLE_URL" \
            --arg title "$TITLE" \
            --arg desc "$DESCRIPTION" \
            --arg thumb "$OG_IMAGE_URL" \
            '{
              "author": $author,
              "lifecycleState": "PUBLISHED",
              "specificContent": {
                "com.linkedin.ugc.ShareContent": {
                  "shareCommentary": {"text": ($text | rtrimstr("\n"))},
                  "shareMediaCategory": "ARTICLE",
                  "media": [{
                    "status": "READY",
                    "originalUrl": $url,
                    "title": {"text": $title},
                    "description": {"text": $desc},
                    "thumbnails": [{"url": $thumb}]
                  }]
                }
              },
              "visibility": {
                "com.linkedin.ugc.MemberNetworkVisibility": "PUBLIC"
              }
            }' > /tmp/payload.json

          echo "--- Debug: text chars=$(wc -c < /tmp/post_text.txt | tr -d ' ') payload bytes=$(wc -c < /tmp/payload.json | tr -d ' ') ---"
          echo "--- Debug: commentary length=$(jq '.specificContent."com.linkedin.ugc.ShareContent".shareCommentary.text | length' /tmp/payload.json) ---"

          echo "Posting to LinkedIn (ugcPosts + ARTICLE)..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            'https://api.linkedin.com/v2/ugcPosts' \
            -H "Authorization: Bearer $LINKEDIN_ACCESS_TOKEN" \
            -H 'Content-Type: application/json' \
            -H 'X-Restli-Protocol-Version: 2.0.0' \
            -d @/tmp/payload.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "201" ]; then
            echo "LinkedIn post published successfully!"
            echo "Response: $BODY"
          else
            echo "::error::LinkedIn post failed with HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi
